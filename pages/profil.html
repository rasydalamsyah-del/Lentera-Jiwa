<div class="profil-page">

<!-- HERO -->
<div class="profil-hero">
  <div class="profil-avatar-wrap">
    <div class="profil-avatar" id="profil-avatar">R</div>
    <span class="profil-role-badge" id="profil-role-badge">Mahasiswa</span>
  </div>
  <h1 class="profil-nama" id="profil-nama">Loading...</h1>
  <p class="profil-username" id="profil-username">@username</p>
  <div class="profil-email-badge">
    <span>✉️</span>
    <span id="profil-email">email@contoh.com</span>
  </div>
</div>

<!-- STATS -->
<div class="profil-stats">
  <div class="profil-stat">
    <div class="profil-stat-val" id="stat-usia">—</div>
    <div class="profil-stat-lbl">Usia</div>
  </div>
  <div class="profil-stat">
    <div class="profil-stat-val" id="stat-gender">—</div>
    <div class="profil-stat-lbl">Gender</div>
  </div>
  <div class="profil-stat">
    <div class="profil-stat-val">✓</div>
    <div class="profil-stat-lbl">Terverifikasi</div>
  </div>
</div>

<!-- INFO PRIBADI -->
<div class="profil-section">
  <div class="profil-card" id="card-info">
    <div class="profil-card-header">
      <div class="profil-card-title"><span class="ic">👤</span> Info Pribadi</div>
      <button class="profil-edit-btn" onclick="profilToggleEdit('card-info', this)">Edit</button>
    </div>
    <div class="profil-info-row">
      <div class="profil-info-icon">🪪</div>
      <div class="profil-info-body">
        <div class="profil-info-lbl">Nama Lengkap</div>
        <div class="profil-info-val" id="val-nama">—</div>
        <input class="profil-input" id="inp-nama" type="text" placeholder="Nama lengkap">
      </div>
    </div>
    <div class="profil-info-row">
      <div class="profil-info-icon">📅</div>
      <div class="profil-info-body">
        <div class="profil-info-lbl">Usia</div>
        <div class="profil-info-val" id="val-usia">—</div>
        <input class="profil-input" id="inp-usia" type="number" min="8" max="100" placeholder="Usia">
      </div>
    </div>
    <div class="profil-info-row">
      <div class="profil-info-icon">⚧️</div>
      <div class="profil-info-body">
        <div class="profil-info-lbl">Gender</div>
        <div class="profil-info-val" id="val-gender">—</div>
        <select class="profil-select" id="inp-gender">
          <option value="L">Laki-laki</option>
          <option value="P">Perempuan</option>
        </select>
      </div>
    </div>
    <div class="profil-info-row">
      <div class="profil-info-icon">🎓</div>
      <div class="profil-info-body">
        <div class="profil-info-lbl">Role</div>
        <div class="profil-info-val" id="val-role">—</div>
      </div>
    </div>
    <button class="profil-save-btn" onclick="profilSaveInfo()">💾 Simpan Perubahan</button>
  </div>
</div>

<!-- AKUN -->
<div class="profil-section">
  <div class="profil-card">
    <div class="profil-card-header">
      <div class="profil-card-title"><span class="ic">🔐</span> Akun</div>
    </div>
    <div class="profil-info-row">
      <div class="profil-info-icon">👤</div>
      <div class="profil-info-body">
        <div class="profil-info-lbl">Username</div>
        <div class="profil-info-val" id="val-username">—</div>
      </div>
    </div>
    <div class="profil-info-row">
      <div class="profil-info-icon">✉️</div>
      <div class="profil-info-body">
        <div class="profil-info-lbl">Email</div>
        <div class="profil-info-val" id="val-email">—</div>
      </div>
    </div>
    <div class="profil-info-row">
      <div class="profil-info-icon">🕐</div>
      <div class="profil-info-body">
        <div class="profil-info-lbl">Login Terakhir</div>
        <div class="profil-info-val" id="val-loginat">—</div>
      </div>
    </div>
  </div>
</div>

<!-- LOGOUT -->
<div class="profil-section">
  <div class="profil-card" style="padding:16px 18px;">
    <button class="profil-logout-btn" onclick="if(confirm('Yakin ingin keluar?')) LJ_AUTH.logout()">
      🚪 Keluar dari Akun
    </button>
    <p class="profil-login-time" id="profil-login-time"></p>
  </div>
</div>

<!-- TOAST -->
<div class="profil-toast" id="profil-toast">✅ Tersimpan!</div>
